# ── Site Settings ─────────────────────────────────────────────────────────────
title: "AtlasSignal"
subtitle: "News Intelligence"
description: "Deep research, market signals, and global analysis"
url: "https://atlassignal.in"
baseurl: ""
repository: "22vaish91-git/atlas-signal-blog"
logo: "/assets/images/header.png"

# ── API / Backend ─────────────────────────────────────────────────────────────
# Lambda Function URL for atlas-signal-api (FastAPI + Mangum).
# Update this when the Function URL changes (check AWS console → atlas-signal-api → Configuration → Function URL).
api_base_url: "https://vz8hhibmqg.execute-api.us-east-1.amazonaws.com"

# ── Monetisation / AdSense ───────────────────────────────────────────────────
# `publisher_id` is your AdSense account ID (ca-pub-...).
# `in_article_slot` is the numeric slot ID from AdSense -> Ads -> By ad unit -> Get code.
# Leave the slot blank until the site is approved; auto ads can still run.
adsense:
  enabled: true
  publisher_id: "ca-pub-4050224762660800"
  in_article_slot: ""
  inject_after_paragraph: 2

# ── Theme ─────────────────────────────────────────────────────────────────────
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"       # dark skin for intelligence/tech aesthetic

# ── Permalink structure — matches blog_url generation in scheduler handler ────
permalink: /posts/:slug/

# ── Build settings ────────────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-paginate

# ── Pagination ────────────────────────────────────────────────────────────────
paginate: 15
paginate_path: /page:num/

# ── Author (sidebar profile) ─────────────────────────────────────────────────
author:
  name: "AtlasSignal"
  avatar: "/assets/images/header.png"
  bio: "News intelligence — cutting through noise to deliver the signals that matter."
  email: "atlassignal.ai@gmail.com"
  links:
    - label: "X"
      icon: "fab fa-fw fa-x-twitter"
      url: "https://x.com/AtlasSignalDesk"
    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://www.youtube.com/channel/UCSdsK1wfTmUyHzZXX_rt2aQ"

# ── Footer ────────────────────────────────────────────────────────────────────
footer:
  links:
    - label: "X"
      icon: "fab fa-fw fa-x-twitter"
      url: "https://x.com/AtlasSignalDesk"
    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://www.youtube.com/channel/UCSdsK1wfTmUyHzZXX_rt2aQ"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:atlassignal.ai@gmail.com"

# ── Reading ───────────────────────────────────────────────────────────────────
words_per_minute: 200
show_date: true

# ── SEO & Analytics ───────────────────────────────────────────────────────────
twitter:
  username: "AtlasSignalDesk"
social:
  type: Organization
  name: AtlasSignal
  links:
    - "https://x.com/AtlasSignalDesk"

# ── Post defaults ─────────────────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
      toc: false
      toc_sticky: false
  - scope:
      path: "_pages"
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
    values:
      layout: single
      author_profile: false

# ── Category archive ─────────────────────────────────────────────────────────
category_archive:
  type: liquid
  path: /categories/

# ── Exclude from build ───────────────────────────────────────────────────────
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - "atlas signal header.png"
