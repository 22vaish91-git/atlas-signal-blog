<!-- Reading progress bar -->
<div id="as-pgbar" style="position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,#3b82f6,#60a5fa);z-index:10000;transition:width 0.08s linear;pointer-events:none;box-shadow:0 0 8px rgba(59,130,246,.6);"></div>
<script>
(function(){
  // Reading progress bar
  function upd(){
    var d=document.documentElement,b=document.body;
    var t=d.scrollTop||b.scrollTop,h=(d.scrollHeight||b.scrollHeight)-d.clientHeight;
    document.getElementById("as-pgbar").style.width=(h>0?Math.min(t/h*100,100):0)+"%";
  }
  window.addEventListener("scroll",upd,{passive:true});

  // Guard: MM theme queries .page__content on every page (incl. home) — null crash fix.
  // Registered here (head) so our DOMContentLoaded fires before main.min.js registers its own.
  document.addEventListener("DOMContentLoaded",function(){
    if(!document.querySelector(".page__content")){
      var g=document.createElement("div");
      g.className="page__content";
      g.setAttribute("aria-hidden","true");
      g.style.cssText="display:none;contain:strict;position:absolute;pointer-events:none;";
      document.body.appendChild(g);
    }
  });
})();
</script>
