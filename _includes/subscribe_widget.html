<section id="subscribe-section" class="as-subscribe-section as-smooth-lift" aria-labelledby="subscribe-title">
  <div class="as-subscribe-shell">
    <div class="as-subscribe-copy">
      <span class="as-eyebrow">Free subscription</span>
      <h2 id="subscribe-title" class="as-subscribe-title">Intelligence briefing, not inbox clutter.</h2>
      <p class="as-subscribe-lead">
        Get concise AtlasSignal dispatches with the strongest angle, strategic consequence, and a direct path into the full report.
      </p>
      <div class="as-subscribe-points">
        <span>Fast hook</span>
        <span>Full blog context</span>
        <span>Topic-specific delivery</span>
      </div>
    </div>

        <form id="subscribe-form"
          class="as-subscribe-form"
          data-consent-url="{{ site.beehiiv_subscribe_url | default: 'https://atlassignal.beehiiv.com/' }}"
          novalidate>

    <div class="as-topic-wrap">
      <p class="as-topic-copy">Pick the lanes you want first in your inbox:</p>
      <div class="as-topic-grid">
        <label class="as-topic-label as-topic-label-all"><input type="checkbox" name="topics" value="All" data-all-topic="true"><span>All topics</span></label>
        <label class="as-topic-label"><input type="checkbox" name="topics" value="AI"><span>AI</span></label>
        <label class="as-topic-label"><input type="checkbox" name="topics" value="Tech"><span>Tech</span></label>
        <label class="as-topic-label"><input type="checkbox" name="topics" value="Space"><span>Space</span></label>
        <label class="as-topic-label"><input type="checkbox" name="topics" value="Health"><span>Health</span></label>
        <label class="as-topic-label"><input type="checkbox" name="topics" value="Sports"><span>Sports</span></label>
        <label class="as-topic-label"><input type="checkbox" name="topics" value="Innovation"><span>Innovation</span></label>
        <label class="as-topic-label"><input type="checkbox" name="topics" value="General"><span>General</span></label>
      </div>
    </div>

    <label class="as-consent-label">
      <input type="checkbox" id="sub-consent" required>
      <span>
        I agree to receive AtlasSignal topic updates.
        <span class="as-consent-subtext">Unsubscribe any time. <a href="/privacy/">Privacy Policy</a>.</span>
      </span>
    </label>

    <button type="submit" id="sub-btn">
      Continue to Secure Signup
    </button>
    </form>
  </div>

  <div id="sub-status" class="as-sub-status" role="status" aria-live="polite"></div>
</section>

<script>
(function () {
  var form = document.getElementById('subscribe-form');
  if (!form || form.dataset.bound === 'true') return;
  form.dataset.bound = 'true';

  var allCheckbox = form.querySelector('input[data-all-topic="true"]');
  var topicCheckboxes = Array.prototype.slice.call(
    form.querySelectorAll('input[name="topics"]:not([data-all-topic="true"])')
  );

  function setStatus(kind, message) {
    var status = document.getElementById('sub-status');
    if (!status) return;
    status.style.display = 'block';
    status.className = 'as-sub-status ' + (kind || '');
    status.textContent = message;
  }

  function clearStatus() {
    var status = document.getElementById('sub-status');
    if (!status) return;
    status.style.display = 'none';
    status.className = 'as-sub-status';
    status.textContent = '';
  }

  if (allCheckbox) {
    allCheckbox.addEventListener('change', function () {
      topicCheckboxes.forEach(function (cb) { cb.checked = allCheckbox.checked; });
    });

    topicCheckboxes.forEach(function (cb) {
      cb.addEventListener('change', function () {
        var everyChecked = topicCheckboxes.length > 0 && topicCheckboxes.every(function (item) { return item.checked; });
        allCheckbox.checked = everyChecked;
      });
    });
  }

  form.addEventListener('change', clearStatus);

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var btn = document.getElementById('sub-btn');
    var consent = document.getElementById('sub-consent');
    var consentBase = (form.getAttribute('data-consent-url') || '').trim();

    var allTopics = ['AI', 'Tech', 'Space', 'Health', 'Sports', 'Innovation', 'General'];

    var topics = Array.prototype.slice.call(
      form.querySelectorAll('input[name="topics"]:checked:not([data-all-topic="true"])')
    ).map(function (cb) { return cb.value; });

    if (allCheckbox && allCheckbox.checked) {
      topics = allTopics.slice();
    }

    if (!topics.length) {
      setStatus('is-error', 'Please select at least one topic.');
      return;
    }

    if (!consent || !consent.checked) {
      setStatus('is-error', 'Please provide consent to continue.');
      return;
    }

    if (!consentBase) {
      setStatus('is-error', 'Subscription is temporarily unavailable. Please try again shortly.');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Redirecting...';
    clearStatus();

    function buildConsentUrl(baseUrl, selectedTopics) {
      var url;
      try {
        url = new URL(baseUrl, window.location.origin);
      } catch (_) {
        return '';
      }
      url.searchParams.set('utm_source', 'atlassignal');
      url.searchParams.set('utm_medium', 'consent_widget');
      url.searchParams.set('utm_campaign', 'newsletter_optin');
      if (selectedTopics && selectedTopics.length) {
        url.searchParams.set('topics', selectedTopics.join(','));
      }
      return url.toString();
    }

    var target = buildConsentUrl(consentBase, topics);
    if (!target) {
      btn.disabled = false;
      btn.textContent = 'Continue to Secure Signup';
      setStatus('is-error', 'Subscription is temporarily unavailable. Please try again shortly.');
      return;
    }

    setStatus('is-success', 'Redirecting you to secure Beehiiv signup...');
    window.location.href = target;
  });
})();
</script>
